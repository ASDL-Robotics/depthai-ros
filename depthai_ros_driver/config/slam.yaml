/oak:
  ros__parameters:
    driver:
      i_enable_ir: false
    pipeline_gen:
      i_nn_type: none
      i_pipeline_type: depth
      i_enable_vio: true
      i_enable_slam: true
    stereo:
      i_depth_preset: DEFAULT
      i_publish_topic: false
      i_board_socket_id: 1
      i_fps: 60.0
    imu:
      i_enable_rotation: false
      i_acc_freq: 200
      i_gyro_freq: 200
      i_batch_report_threshold: 1
      i_max_batch_reports: 10
